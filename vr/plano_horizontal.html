<html>
  <head>
	<title>360 Image Browser</title>
	<meta charset="ISO-8859-1">
	<script src="https://aframe.io/releases/0.8.2/aframe.min.js"></script>
	<script src=".././scripts/aframe-orbit-controls.min.js"></script>
	<script src=".././scripts/faceset.js"></script>
</head>  
<body>
	<a-scene>
		<a-assets>
			<a-mixin id="imagem" material="side: double; transparent: true; depthTest: false;"></a-mixin>
			<a-mixin id="mtl0" material="opacity: 0.7; side: double; metalness:0.3; roughness:0.9; depthTest: false;"></a-mixin>
			<a-mixin id="mtl1" material="color: #4b97ee;"></a-mixin>
			<a-mixin id="mtl2" material="color: #ee514b"></a-mixin>
			<a-mixin id="mtl3" material="color: #1E9961;"></a-mixin>
			<a-mixin id="mtl4" material="color: #B404AE;"></a-mixin>
			<a-mixin id="mtl5" material="color: #82FA58;"></a-mixin>
			<a-mixin id="mtl6" material="color: #58ACFA;"></a-mixin>
			<a-mixin id="mtl7" material="color: orange;"></a-mixin>
			<a-mixin id="mtl8" material="color: #d8ef09;"></a-mixin>
			<a-mixin id="mtl9" material="color: #6E6E6E;"></a-mixin>
			<a-mixin id="linhas" material="color: black; wireframe: true; wireframe-linewidth:1;"></a-mixin>
			<a-mixin id="texto" text="width: 9; side:double; color: black" rotation="-25 0 0">
			<a-mixin id="mtl0p" material="opacity: 0.2; roughness: 0.9; metalness: 0.3; side: double; depthTest: false;"></a-mixin>
			<a-mixin id="ponto" geometry="radius:0.1;" mixin="mtl8"></a-mixin>
		</a-assets>

		<a-entity hand-controls controller-cursor raycaster="far: 2"></a-entity>
		<a-entity gearvr-controls></a-entity>

		<a-entity scale="1 1 1" position="-2 -2 0">
			<a-text position="0.6 0 2" value="A" mixin="texto"></a-text>
			<a-text position="4.1 0 1" value="B" mixin="texto"></a-text>
			<a-text position="5 0 4" value="C" mixin="texto"></a-text>
			
			<a-text position="6.5 0.1 0.3" value="x" rotation="-90 0 0" mixin="texto"></a-text>
			<a-text position="-0.4 0.1 6.5" value="y" rotation="-90 0 0" mixin="texto"></a-text>
			<a-text position="-0.4 6.5 0" value="z" mixin="texto"></a-text>
			<a-cone rotation="90 90 0" position="7.15 0 0" color="red" radius-bottom="0.11" radius-top="0" height="0.3"></a-cone>
			<a-cone rotation="90 0 0" position="0 0 7.15" color="green" radius-bottom="0.11" radius-top="0" height="0.3"></a-cone>
			<a-cone position="0 7.15 0" color="blue" radius-bottom="0.11" radius-top="0" height="0.3"></a-cone>
			<a-entity line__4="start: 0 0 7; end: 0 0 -2; color: green" 
			line__5="start: -2 0 0; end: 7 0 0; color: red"
			line__1="start: 0 -2 0; end: 0 7 0; color: blue"></a-entity>
			<a-text position="0.1 0.2 0.1" value="O" mixin="texto"></a-text>
			<a-image src="pi1.png" height="0.5" width="0.5" position="5.5 0.2 5.5" mixin="imagem" rotation="-25 0 0"></a-image>
			<a-image src="pi2.png" height="0.5" width="0.6" position="5.5 5.5 0.1" mixin="imagem" rotation="-25 0 0"></a-image>
			<a-image src="pi3.png" height="0.5" width="0.7" position="0.1 5.5 5.5" mixin="imagem" rotation="-25 90 0"></a-image>
			<a-entity id="planoPI" faceset="vertices: -2 0 6  6 0 6  6 0 -2  -2 0 -2" mixin="mtl0p mtl9"></a-entity>
			<a-entity id="planoPI2" faceset="vertices: -2 6 0  6 6 0  6 -2 0  -2 -2 0" mixin="mtl0p mtl9"></a-entity>
			<a-entity id="planoPI3" faceset="vertices: 0 6 -2  0 6 6  0 -2 6  0 -2 -2" mixin="mtl0p mtl9"></a-entity>
			<a-sphere mixin="ponto" position="0 0 0"></a-sphere>
			
			<a-entity position="0 2.5 0">
				<a-entity faceset="vertices: -2 0 6  6 0 6  6 0 -2  -2 0 -2;" 
					mixin="mtl0 mtl2"></a-entity>
			</a-entity>
			
			<a-entity id="arestas" line="start: 3 5 3; end: 1 0 2; color: #6E6E6E" line__2="start: 3 5 3; end: 4 0 1; color: #6E6E6E"
				line__3="start: 3 5 3; end: 5 0 4; color: #6E6E6E" line__4="start: 3 5 3; end: 2 0 5; color: #6E6E6E;"
				line__5="start: 1 0 2; end: 4 0 1; color: #6E6E6E" line__8="start: 4 0 1; end: 5 0 4; color: #6E6E6E"
				line__6="start: 5 0 4; end: 2 0 5; color: #6E6E6E" line__7="start: 2 0 5; end: 1 0 2; color: #6E6E6E;">
			</a-entity>

		</a-entity>
		
		<a-entity camera="fov:1; near:5; zoom:0.9" orbit-controls="target: 0 0 0; maxPolarAngle: 360; initialPosition: 250 250 600"></a-entity>
	  
		<a-light type="ambient" color="#eaeaea" intensity="1"></a-light>
		<a-light type="spot" intensity="1.2" position="0 10 3" angle="180" color="#eaeaea"></a-light>
		<a-sky color="rgba(150,200,255)"></a-sky>

	</a-scene>
</body>
</html>
