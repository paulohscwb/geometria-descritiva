<html>
  <head>
	<title>360 Image Browser</title>
	<meta charset="ISO-8859-1">
	<script src="https://aframe.io/releases/0.8.2/aframe.min.js"></script>
	<script src=".././scripts/aframe-orbit-controls.min.js"></script>
	<script src=".././scripts/faceset.js"></script>
</head>  
<body>
	<a-scene>
		<a-assets>
			<a-mixin id="mtl0" material="opacity: 0.7; side: double; metalness:0.3; roughness:0.9;"></a-mixin>
			<a-mixin id="mtl1" material="color: #4b97ee;"></a-mixin>
			<a-mixin id="mtl2" material="color: #ee514b"></a-mixin>
			<a-mixin id="mtl3" material="color: #1E9961;"></a-mixin>
			<a-mixin id="mtl4" material="color: #B404AE;"></a-mixin>
			<a-mixin id="mtl5" material="color: #82FA58;"></a-mixin>
			<a-mixin id="mtl6" material="color: #58ACFA;"></a-mixin>
			<a-mixin id="mtl7" material="color: orange;"></a-mixin>
			<a-mixin id="mtl8" material="color: #d8ef09;"></a-mixin>
			<a-mixin id="mtl9" material="color: #6E6E6E;"></a-mixin>
			<a-mixin id="linhas" material="color: #262626; wireframe: true; wireframe-linewidth:1;"></a-mixin>
			<a-mixin id="texto" text="width: 9; side:double; color: black">
			<a-mixin id="mtl0p" material="opacity: 0.2; roughness: 0.9; metalness: 0.3; side: double;"></a-mixin>
			<a-mixin id="ponto" geometry="radius:0.1;" mixin="mtl8"></a-mixin>
		</a-assets>

		<a-entity hand-controls controller-cursor raycaster="far: 2"></a-entity>
		<a-entity gearvr-controls></a-entity>

		<a-entity id="pg48_icosaedro_alturas" scale="1 1 1" position="-4.8 -3.5 -5.2">
	  		<a-entity id="h1_JE" line="start: 1.8 6 5.9; end: 1.8 3 5.9; color: red" line__2="start: 1.8 3 5.9; end: 2.9 3 7.5; color: grey"></a-entity>
			<a-entity id="h2_LH" line="start: 4.9 7.6 5; end: 4.9 6 5; color: red" line__2="start: 4.9 6 5; end: 7.7 6 6.3; color: grey"></a-entity>
			<a-text position="1.6 3 4" value="A" mixin="texto"></a-text>
			<a-text position="5.1 3 2" value="B" mixin="texto"></a-text>
			<a-text position="2.5 3 7.5" value="C" mixin="texto"></a-text>
			<a-text position="6.5 3 7.5" value="D" mixin="texto"></a-text>
			<a-text position="7.9 3 4.3" value="E" mixin="texto"></a-text>
			<a-text position="6.8 6 2.6" value="F" mixin="texto"></a-text>
			<a-text position="2.8 6 2.5" value="G" mixin="texto"></a-text>
			<a-text position="1.4 6 5.9" value="H" mixin="texto"></a-text>
			<a-text position="4.8 6 8.1" value="I" mixin="texto"></a-text>
			<a-text position="7.7 6 6.3" value="J" mixin="texto"></a-text>
			<a-text position="4.9 1.3 5" value="K" mixin="texto"></a-text>
			<a-text position="4.9 7.8 5" value="L" mixin="texto"></a-text>
			<a-text position="1.3 4.5 5.9" value="h1" mixin="texto"></a-text>
			<a-text position="4.9 6.5 5" value="h2" mixin="texto"></a-text>
			
			<a-text position="9 0.1 0.5" value="x" rotation="-90 0 0" mixin="texto"></a-text>
			<a-text position="-0.4 0.1 9" value="y" rotation="-90 0 0" mixin="texto"></a-text>
			<a-text position="-0.4 7.5 0" value="z" mixin="texto"></a-text>
			<a-entity line__4="start: 0 0 10; end: 0 0 -2; color: green" 
			line__5="start: -5 0 0; end: 10 0 0; color: red"
			line__1="start: 0 -2 0; end: 0 8 0; color: blue"></a-entity>
			<a-text position="0.1 0.2 0" value="O" mixin="texto"></a-text>
			<a-text position="9 0.1 9.2" value="pi'" rotation="-90 0 0" mixin="texto"></a-text>
			<a-text position="9 7.2 0.1" value="pi''" mixin="texto"></a-text>
			<a-entity id="planoPI" faceset="vertices: -5 0 10  10 0 10  10 0 -2  -5 0 -2" mixin="mtl0p mtl9"></a-entity>
			<a-entity id="planoPI2" faceset="vertices: -5 8 0  10 8 0  10 -2 0  -5 -2 0" mixin="mtl0p mtl9"></a-entity>
			<a-sphere mixin="ponto" position="0 0 0"></a-sphere>
			
			<a-entity id="ABCDE-K" faceset="vertices: 2 3 4  5 3 2  2.9 3 7.5  6.5 3 7.5  7.9 3 4.3  4.9 1.5 5;" 
				mixin="mtl0 mtl1"></a-entity>
			<a-entity id="ABCDE-K" faceset="vertices: 2 3 4  5 3 2  2.9 3 7.5  6.5 3 7.5  7.9 3 4.3  4.9 1.5 5;" 
				mixin="linhas"></a-entity>
			<a-entity id="ABF-AJF" faceset="vertices: 2 3 4  5 3 2  3.2 6 2.5  2 3 4  1.8 6 5.9  3.2 6 2.5; projectdir:z" 
				mixin="mtl0 mtl2"></a-entity>
			<a-entity id="ABF-AJF" faceset="vertices: 2 3 4  5 3 2  3.2 6 2.5  2 3 4  1.8 6 5.9  3.2 6 2.5; projectdir:z" 
				mixin="linhas"></a-entity>
			<a-entity id="EAJ-EIJ" faceset="vertices: 2.9 3 7.5  2 3 4  1.8 6 5.9  2.9 3 7.5  4.7 6 8.1  1.8 6 5.9;" 
				mixin="mtl0 mtl2"></a-entity>
			<a-entity id="EAJ-EIJ" faceset="vertices: 2.9 3 7.5  2 3 4  1.8 6 5.9  2.9 3 7.5  4.7 6 8.1  1.8 6 5.9;" 
				mixin="linhas"></a-entity>
			<a-entity id="DEI-DHI" faceset="vertices: 6.5 3 7.5  2.9 3 7.5  4.7 6 8.1  6.5 3 7.5  7.7 6 6.3  4.7 6 8.1;" 
				mixin="mtl0 mtl2"></a-entity>
			<a-entity id="DEI-DHI" faceset="vertices: 6.5 3 7.5  2.9 3 7.5  4.7 6 8.1  6.5 3 7.5  7.7 6 6.3  4.7 6 8.1;" 
				mixin="linhas"></a-entity>
			<a-entity id="CDH-CGH" faceset="vertices: 7.9 3 4.3  6.5 3 7.5  7.7 6 6.3  7.9 3 4.3  6.8 6 2.6  7.7 6 6.3;" 
				mixin="mtl0 mtl2"></a-entity>
			<a-entity id="CDH-CGH" faceset="vertices: 7.9 3 4.3  6.5 3 7.5  7.7 6 6.3  7.9 3 4.3  6.8 6 2.6  7.7 6 6.3;" 
				mixin="linhas"></a-entity>
			<a-entity id="BCG-BFG" faceset="vertices: 5 3 2  7.9 3 4.3  6.8 6 2.6  5 3 2  3.2 6 2.5  6.8 6 2.6;" 
				mixin="mtl0 mtl2"></a-entity>
			<a-entity id="BCG-BFG" faceset="vertices: 5 3 2  7.9 3 4.3  6.8 6 2.6  5 3 2  3.2 6 2.5  6.8 6 2.6;" 
				mixin="linhas"></a-entity>
			<a-entity id="FGHIJ-L" faceset="vertices: 6.8 6 2.6  3.2 6 2.5  1.8 6 5.9  4.7 6 8.1  7.7 6 6.3  4.9 7.6 5;" 
				mixin="mtl0 mtl3"></a-entity>
			<a-entity id="FGHIJ-L" faceset="vertices: 6.8 6 2.6  3.2 6 2.5  1.8 6 5.9  4.7 6 8.1  7.7 6 6.3  4.9 7.6 5;" 
				mixin="linhas"></a-entity>
			
		</a-entity>
		
		<a-entity camera look-controls orbit-controls="target: 0 0 0; minDistance: 0.5; minPolarAngle:0; maxPolarAngle: 270; initialPosition: 0 2 8"></a-entity>
	  
		<a-light type="ambient" color="#eaeaea" intensity="1"></a-light>
		<a-light type="spot" intensity="1.2" position="0 10 3" angle="180" color="#eaeaea"></a-light>
		<a-sky color="rgba(150,200,255)"></a-sky>

	</a-scene>
</body>
</html>
