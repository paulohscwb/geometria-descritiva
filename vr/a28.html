<html>
  <head>
	<title>360 Image Browser</title>
	<meta charset="ISO-8859-1">
	<script src="https://aframe.io/releases/0.8.2/aframe.min.js"></script>
	<script src=".././scripts/aframe-orbit-controls.min.js"></script>
	<script src=".././scripts/faceset.js"></script>
</head>  
<body>
	<a-scene>
		<a-assets>
			<a-mixin id="mtl0" material="opacity: 0.7; side: double; metalness:0.3; roughness:0.9;"></a-mixin>
			<a-mixin id="mtl1" material="color: #4b97ee;"></a-mixin>
			<a-mixin id="mtl2" material="color: #ee514b"></a-mixin>
			<a-mixin id="mtl3" material="color: #1E9961;"></a-mixin>
			<a-mixin id="mtl4" material="color: #B404AE;"></a-mixin>
			<a-mixin id="mtl5" material="color: #82FA58;"></a-mixin>
			<a-mixin id="mtl6" material="color: #58ACFA;"></a-mixin>
			<a-mixin id="mtl7" material="color: orange;"></a-mixin>
			<a-mixin id="mtl8" material="color: #d8ef09;"></a-mixin>
			<a-mixin id="mtl9" material="color: #6E6E6E;"></a-mixin>
			<a-mixin id="linhas" material="color: black; wireframe: true; wireframe-linewidth:1;"></a-mixin>
			<a-mixin id="mtl0p" material="opacity: 0.2; roughness: 0.9; metalness: 0.3; side: double;"></a-mixin>
			<a-mixin id="texto" text="width: 9; side:double; color: black">
			<a-mixin id="ponto" geometry="radius:0.1;" mixin="mtl8"></a-mixin>
		</a-assets>

		<a-entity hand-controls controller-cursor raycaster="far: 2"></a-entity>
		<a-entity gearvr-controls></a-entity>

		<a-entity scale="1 1 1" position="-2 -4 -2.5">
	  		<a-entity>
				<a-text position="3.1 1 1.8" value="A" mixin="texto"></a-text>
				<a-text position="4.9 2.7 1.4" value="B" mixin="texto"></a-text>
				<a-text position="4.3 4.9 0.3" value="C" mixin="texto"></a-text>
				<a-text position="1.5 5.5 -0.5" value="D" mixin="texto"></a-text>
				<a-text position="-0.4 3.7 -0.1" value="E" mixin="texto"></a-text>
				<a-text position="0.2 1.5 1" value="F" mixin="texto"></a-text>
				<a-text position="2.5 2.2 4.3" value="G" mixin="texto"></a-text>
				<a-text position="4.3 3.9 3.8" value="H" mixin="texto"></a-text>
				<a-text position="3.9 6.1 2.7" value="I" mixin="texto"></a-text>
				<a-text position="0.9 6.7 2" value="J" mixin="texto"></a-text>
				<a-text position="-1 5 2.4" value="K" mixin="texto"></a-text>
				<a-text position="-0.4 2.8 3.6" value="L" mixin="texto"></a-text>
				
				<a-text position="9 0.1 0.5" value="x" rotation="-90 0 0" mixin="texto"></a-text>
				<a-text position="-0.4 0.1 9" value="y" rotation="-90 0 0" mixin="texto"></a-text>
				<a-text position="-0.4 7.5 0" value="z" mixin="texto"></a-text>
				<a-entity line__4="start: 0 0 10; end: 0 0 -2; color: green" 
				line__5="start: -5 0 0; end: 10 0 0; color: red"
				line__1="start: 0 -2 0; end: 0 8 0; color: blue"></a-entity>
				<a-text position="0.1 0.2 0" value="O" mixin="texto"></a-text>
				<a-text position="9 0.1 9.2" value="pi'" rotation="-90 0 0" mixin="texto"></a-text>
				<a-text position="9 7.2 0.1" value="pi''" mixin="texto"></a-text>
				<a-entity id="planoPI" faceset="vertices: -5 0 10  10 0 10  10 0 -2  -5 0 -2" mixin="mtl0p mtl9"></a-entity>
				<a-entity id="planoPI2" faceset="vertices: -5 8 0  10 8 0  10 -2 0  -5 -2 0" mixin="mtl0p mtl9"></a-entity>
				<a-sphere mixin="ponto" position="0 0 0"></a-sphere>
				
				<a-entity id="ABCDEF" faceset="vertices: 3 1 1.8  4.9 2.7 1.4  4.3 4.9 0.3  2 5.5 -0.5  0 3.7 -0.1  0.6 1.5 1;" 
					mixin="mtl0 mtl5"></a-entity>
				<a-entity id="GHIJKL" faceset="vertices: 2.5 2.2 4.3  4.3 3.9 3.8  3.8 6.1 2.7  1.3 6.7 2  -0.6 5 2.4  0 2.8 3.6;" 
					mixin="mtl0 mtl5"></a-entity>
				<a-entity id="ABHG" faceset="vertices: 3 1 1.8  4.9 2.7 1.4  4.3 3.9 3.8  2.5 2.2 4.3;" 
					mixin="mtl0 mtl5"></a-entity>
				<a-entity id="BCIH" faceset="vertices: 4.9 2.7 1.4  4.3 4.9 0.3  3.8 6.1 2.7  4.3 3.9 3.8;" 
					mixin="mtl0 mtl5"></a-entity>
				<a-entity id="CDJI" faceset="vertices: 4.3 4.9 0.3  2 5.5 -0.5  1.3 6.7 2  3.8 6.1 2.7;" 
					mixin="mtl0 mtl5"></a-entity>
				<a-entity id="DEKJ" faceset="vertices: 2 5.5 -0.5  0 3.7 -0.1  -0.6 5 2.4  1.3 6.7 2;" 
					mixin="mtl0 mtl5"></a-entity>
				<a-entity id="EFLK" faceset="vertices: 0 3.7 -0.1  0.6 1.5 1  0 2.8 3.6  -0.6 5 2.4;" 
					mixin="mtl0 mtl5"></a-entity>
				<a-entity id="FAGL" faceset="vertices: 0.6 1.5 1  3 1 1.8  2.5 2.2 4.3  0 2.8 3.6;" 
					mixin="mtl0 mtl5"></a-entity>
				<a-entity id="arestas" line="start: 3 1 1.8; end: 4.9 2.7 1.4; color: #404040" line__2="start: 4.9 2.7 1.4; end: 4.3 4.9 0.3; color: #404040"
					line__3="start: 4.3 4.9 0.3; end: 2 5.5 -0.5; color: #404040" line__4="start: 2 5.5 -0.5; end: 0 3.7 -0.1; color: #404040;"
					line__5="start: 0 3.7 -0.1; end: 0.6 1.5 1; color: #404040" line__8="start: 0.6 1.5 1; end: 3 1 1.8; color: #404040"
					line__6="start: 2.5 2.2 4.3; end: 4.3 3.9 3.8; color: #404040" line__7="start: 4.3 3.9 3.8; end: 3.8 6.1 2.7; color: #404040;"
					line__10="start: 3.8 6.1 2.7; end: 1.3 6.7 2; color: #404040" line__12="start: 1.3 6.7 2; end: -0.6 5 2.4; color: #404040"
					line__13="start: -0.6 5 2.4; end: 0 2.8 3.6; color: #404040" line__18="start: 0 2.8 3.6; end: 2.5 2.2 4.3; color: #404040;"
					line__9="start: 3 1 1.8; end: 2.5 2.2 4.3; color: #404040" line__11="start: 4.9 2.7 1.4; end: 4.3 3.9 3.8; color: #404040;"
					line__14="start: 4.3 4.9 0.3; end: 3.8 6.1 2.7; color: #404040" line__15="start: 2 5.5 -0.5; end: 1.3 6.7 2; color: #404040"
					line__16="start: 0 3.7 -0.1; end: -0.6 5 2.4; color: #404040" line__17="start: 0.6 1.5 1; end: 0 2.8 3.6; color: #404040;">
				</a-entity>
			</a-entity>
		</a-entity>
		
		<a-entity camera look-controls orbit-controls="target: 0 0 0; maxPolarAngle: 360; initialPosition: 0 2 8"></a-entity>
	  
		<a-light type="ambient" color="#eaeaea" intensity="1"></a-light>
		<a-light type="spot" intensity="1.2" position="0 10 3" angle="180" color="#eaeaea"></a-light>
		<a-sky color="rgba(150,200,255)"></a-sky>

	</a-scene>
</body>
</html>
