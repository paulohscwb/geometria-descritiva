<html>
  <head>
	<title>360 Image Browser</title>
	<meta charset="ISO-8859-1">
	<script src="https://aframe.io/releases/1.0.0/aframe.js"></script>
	<script src=".././scripts/aframe-orbit-controls.min.js"></script>
	<script src=".././scripts/faceset.js"></script>
  </head>  
<body>
	<a-scene>
		<a-assets>
			<a-mixin id="imagem" material="side: double; transparent: true; depthTest: false;"></a-mixin>
			<a-mixin id="mtl0" material="opacity: 0.5; side: double; metalness:0.3; roughness:0.9;"></a-mixin>
			<a-mixin id="mtl1" material="color: #4b97ee;"></a-mixin>
			<a-mixin id="mtl2" material="color: #ee514b"></a-mixin>
			<a-mixin id="mtl3" material="color: #1E9961;"></a-mixin>
			<a-mixin id="mtl4" material="color: #B404AE;"></a-mixin>
			<a-mixin id="mtl5" material="color: #82FA58;"></a-mixin>
			<a-mixin id="mtl6" material="color: #58ACFA;"></a-mixin>
			<a-mixin id="mtl7" material="color: orange;"></a-mixin>
			<a-mixin id="mtl8" material="color: #d8ef09;"></a-mixin>
			<a-mixin id="mtl9" material="color: #6E6E6E;"></a-mixin>
			<a-mixin id="linhas" material="color: black; wireframe: true; wireframe-linewidth:1;"></a-mixin>
			<a-mixin id="mtl0p" material="opacity: 0.2; roughness: 0.9; metalness: 0.3; side: double;"></a-mixin>
			<a-mixin id="texto" text="width: 12; side:double; color: black" rotation="-25 0 0">
			<a-mixin id="ponto" geometry="radius:0.1;" mixin="mtl8"></a-mixin>
		</a-assets>

		<a-entity hand-controls controller-cursor raycaster="far: 2"></a-entity>
		<a-entity gearvr-controls></a-entity>
		
		<a-entity scale="0.7 0.7 0.7" position="0 0 1">
			
			<a-entity animation="property: rotation; to: 90 0 0; loop: false; dur: 10000; delay:8500;">
			<a-entity animation="property: position; from: 0 0 0; to: 0 0.01 0; loop: true; dur: 10000; delay:8500;">
				<a-text position="4.4 0.1 0.5" value="x" rotation="-90 0 0" mixin="texto"></a-text>
				<a-text position="0 0.1 4.5" value="y" rotation="-90 0 0" mixin="texto"></a-text>
				<a-cone rotation="90 0 0" position="0 0 5.15" color="green" radius-bottom="0.11" radius-top="0" height="0.3"></a-cone>

				<a-sphere mixin="ponto" position="2 0 2"></a-sphere>
				<a-text position="2 0.1 2" value="A'" rotation="-90 0 0" mixin="texto"></a-text>
				<a-sphere mixin="ponto" position="1 0 1.5"></a-sphere>
				<a-text position="1 0.1 1.5" value="B'" rotation="-90 0 0" mixin="texto"></a-text>
				<a-sphere mixin="ponto" position="4 0 -2"></a-sphere>
				<a-text position="4 0.1 -2" value="C'" rotation="-90 0 0" mixin="texto"></a-text>
				<a-sphere mixin="ponto" position="3 0 -2.5"></a-sphere>
				<a-text position="3 0.1 -2.5" value="D'" rotation="-90 0 0" mixin="texto"></a-text>

				<a-image src="pi1.png" height="0.6" width="0.6" position="4.5 0.05 4.5" mixin="imagem" rotation="-25 0 0"></a-image>
				
				<a-entity line="start: 2 0 2; end: 2 0 0; color: #6E6E6E"
				line__2="start: 1 0 1.5; end: 1 0 0; color: #6E6E6E"
				line__3="start: 4 0 -2; end: 4 0 0; color: #6E6E6E"
				line__5="start: 3 0 -2.5; end: 3 0 0; color: #6E6E6E"
				line__4="start: 0 0 5; end: 0 0 -5; color: green"></a-entity>
			</a-entity>
			</a-entity>

			<a-text position="0 4.8 0" value="z" mixin="texto"></a-text>
			<a-cone position="0 5.15 0" color="blue" radius-bottom="0.11" radius-top="0" height="0.3"></a-cone>
			<a-cone rotation="90 90 0" position="5.15 0 0" color="red" radius-bottom="0.11" radius-top="0" height="0.3"></a-cone>
			<a-text position="-2 2.5 2.5"  rotation="-30 0 0" value="1o diedro" mixin="texto"></a-text>
			<a-text position="-2 2.5 -2.5" rotation="-30 0 0" value="2o diedro" mixin="texto"></a-text>
			<a-text position="-2 -2.5 -2.5" rotation="-30 0 0" value="3o diedro" mixin="texto"></a-text>
			<a-text position="-2 -2.5 2.5" rotation="-30 0 0" value="4o diedro" mixin="texto"></a-text>
			
			<a-sphere mixin="ponto" position="2 3 2"></a-sphere>
			<a-text position="2 3 2" value="A" mixin="texto"></a-text>
			<a-sphere mixin="ponto" position="2 3 0"></a-sphere>
			<a-text position="2 3 0" value="A''" mixin="texto"></a-text>
			
			<a-sphere mixin="ponto" position="1 -2 1.5"></a-sphere>
			<a-text position="1 -2 1.5" value="B" mixin="texto"></a-text>
			<a-sphere mixin="ponto" position="1 -2 0"></a-sphere>
			<a-text position="1 -2 0" value="B''" mixin="texto"></a-text>
			
			<a-sphere mixin="ponto" position="4 -1 -2"></a-sphere>
			<a-text position="4 -1 -2" value="C" mixin="texto"></a-text>
			<a-sphere mixin="ponto" position="4 -1 0"></a-sphere>
			<a-text position="4 -1 0" value="C''" mixin="texto"></a-text>
			
			<a-sphere mixin="ponto" position="3 3.5 -2.5"></a-sphere>
			<a-text position="3 3.5 -2.5" value="D" mixin="texto"></a-text>
			<a-sphere mixin="ponto" position="3 3.5 0"></a-sphere>
			<a-text position="3 3.5 0" value="D''" mixin="texto"></a-text>
			
			<a-image src="pi2.png" height="0.6" width="0.7" position="4.4 4.5 0.1" mixin="imagem" rotation="0 0 0"></a-image>		
			
			<a-entity line__2="start: 2 3 0; end: 2 0 0; color: #6E6E6E"
			line__3="start: 1 -2 0; end: 1 0 0; color: #6E6E6E"
			line__4="start: 4 -1 0; end: 4 0 0; color: #6E6E6E"
			line__6="start: 3 3.5 0; end: 3 0 0; color: #6E6E6E"
			line__5="start: -5 0 0; end: 5 0 0; color: red"
			line__1="start: 0 -5 0; end: 0 5 0; color: blue"></a-entity>
			<a-entity animation="property: rotation; to: 90 0 0; loop: false; dur: 10000; delay:8500;">
				<a-entity animation="property: position; from: 0 0 0; to: 0 0.01 0; loop: false; dur: 10000; delay:8500;">
					<a-entity id="planoPI" faceset="vertices: -5 0 5  5 0 5  5 0 -5  -5 0 -5" mixin="mtl0 mtl2"></a-entity>
				</a-entity>
			</a-entity>
			<a-entity id="planoPI2" faceset="vertices: -5 5 0  5 5 0  5 -5 0  -5 -5 0" mixin="mtl0 mtl3"></a-entity>
		</a-entity>
		
		<a-entity camera="fov:1; near:5;" orbit-controls="target: 0 0 0; maxPolarAngle: 360; initialPosition: 100 250 500"></a-entity>
		<a-sky color="rgba(150,200,255)"></a-sky>

	</a-scene>
</body>
</html>
