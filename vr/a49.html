<html>
  <head>
	<title>360 Image Browser</title>
	<meta charset="ISO-8859-1">
	<script src="https://aframe.io/releases/0.8.2/aframe.min.js"></script>
	<script src="https://paulohscwb.github.io/polyhedra/scripts/aframe-orbit-controls.min.js"></script>
	<script src="https://paulohscwb.github.io/polyhedra/scripts/faceset.js"></script>
</head>  
<body>
	<a-scene>
		<a-assets>
			<a-mixin id="mtl0" material="opacity: 0.7; side: double; metalness:0.3; roughness:0.9;"></a-mixin>
			<a-mixin id="mtl1" material="color: #4b97ee;"></a-mixin>
			<a-mixin id="mtl2" material="color: #ee514b"></a-mixin>
			<a-mixin id="mtl3" material="color: #1E9961;"></a-mixin>
			<a-mixin id="mtl4" material="color: #B404AE;"></a-mixin>
			<a-mixin id="mtl5" material="color: #82FA58;"></a-mixin>
			<a-mixin id="mtl6" material="color: #58ACFA;"></a-mixin>
			<a-mixin id="mtl7" material="color: orange;"></a-mixin>
			<a-mixin id="mtl8" material="color: #d8ef09;"></a-mixin>
			<a-mixin id="mtl9" material="color: #6E6E6E;"></a-mixin>
			<a-mixin id="linhas" material="color: black; wireframe: true; wireframe-linewidth:1;"></a-mixin>
			<a-mixin id="texto" text="width: 9; side:double; color: black">
			<a-mixin id="mtl0p" material="opacity: 0.2; roughness: 0.9; metalness: 0.3; side: double;"></a-mixin>
			<a-mixin id="ponto" geometry="radius:0.1;" mixin="mtl8"></a-mixin>
		</a-assets>

		<a-entity hand-controls controller-cursor raycaster="far: 2"></a-entity>
		<a-entity gearvr-controls></a-entity>

		<a-entity scale="1 1 1" position="-6.5 -1.5 -3">
			<a-text position="0.6 0 3" value="A" mixin="texto"></a-text>
			<a-text position="4.2 0 1" value="B" mixin="texto"></a-text>
			<a-text position="6 0 4" value="C" mixin="texto"></a-text>
			<a-text position="2.5 0 6" value="D" mixin="texto"></a-text>
			<a-text position="6.5 3 2" value="E" mixin="texto"></a-text>
			<a-text position="10.1 3 0" value="F" mixin="texto"></a-text>
			<a-text position="11.8 3 3" value="G" mixin="texto"></a-text>
			<a-text position="8.3 3 5" value="H" mixin="texto"></a-text>
			
			<a-text position="0.1 0.2 0" value="O" mixin="texto"></a-text>
			<a-text position="11 0.1 9.2" value="pi'" rotation="-90 0 0" mixin="texto"></a-text>
			<a-text position="11 7.2 0.1" value="pi''" mixin="texto"></a-text>
			<a-entity id="planoPI" faceset="vertices: -3 -0.05 10  12 -0.05 10  12 -0.05 -2  -3 -0.05 -2" mixin="mtl0p mtl9"></a-entity>
			<a-entity id="planoPI2" faceset="vertices: -3 8 0  12 8 0  12 -2 0  -3 -2 0" mixin="mtl0p mtl9"></a-entity>
			<a-sphere mixin="ponto" position="0 0 0"></a-sphere>
				
			<a-entity id="ABCD" faceset="vertices: 1 0 3  4 0 1  5.8 0 4  2.9 0 6  1 0 3;" 
				mixin="mtl0 mtl6"></a-entity>
			<a-entity id="EFGH" faceset="vertices: 7 3 2  10 3 0  11.8 3 3  8.9 3 5  7 3 2;" 
				mixin="mtl0 mtl6"></a-entity>
			<a-entity id="ABFE" faceset="vertices: 1 0 3  4 0 1  10 3 0  7 3 2;" 
				mixin="mtl0 mtl6"></a-entity>
			<a-entity id="BCGF" faceset="vertices: 4 0 1  5.8 0 4  11.8 3 3  10 3 0;" 
				mixin="mtl0 mtl6"></a-entity>
			<a-entity id="CDHG" faceset="vertices: 5.8 0 4  2.9 0 6  8.9 3 5  11.8 3 3;" 
				mixin="mtl0 mtl6"></a-entity>
			<a-entity id="DAEH" faceset="vertices: 2.9 0 6  1 0 3  7 3 2  8.9 3 5;" 
				mixin="mtl0 mtl6"></a-entity>
			<a-entity id="arestas" line="start: 1 0 3; end: 4 0 1; color: #262626" line__2="start: 4 0 1; end: 5.8 0 4; color: #262626"
				line__3="start: 5.8 0 4; end: 2.9 0 6; color: #262626" line__4="start: 2.9 0 6; end: 1 0 3; color: #262626;"
				line__5="start: 7 3 2; end: 10 3 0; color: #262626" line__8="start: 10 3 0; end: 11.8 3 3; color: #262626"
				line__6="start: 11.8 3 3; end: 8.9 3 5; color: #262626" line__7="start: 8.9 3 5; end: 7 3 2; color: #262626;"
				line__10="start: 1 0 3; end: 7 3 2; color: #262626" line__12="start: 4 0 1; end: 10 3 0; color: #262626"
				line__9="start: 5.8 0 4; end: 11.8 3 3; color: #262626" line__11="start: 2.9 0 6; end: 8.9 3 5; color: #262626;">
			</a-entity>
			
		</a-entity>
		
		<a-entity camera look-controls orbit-controls="target: 0 0 0; minDistance: 0.5; maxPolarAngle: 180; maxDistance: 180; initialPosition: 0 2 8"></a-entity>
	  
		<a-light type="ambient" color="#eaeaea" intensity="1"></a-light>
		<a-light type="spot" intensity="1.5" position="3 6 3" angle="180" color="#eaeaea"></a-light>
		<a-sky color="rgba(150,200,255)"></a-sky>

	</a-scene>
</body>
</html>
