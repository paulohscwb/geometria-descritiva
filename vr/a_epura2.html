<html>
  <head>
	<title>360 Image Browser</title>
	<meta charset="ISO-8859-1">
	<script src="https://aframe.io/releases/0.9.0/aframe.js"></script>
	<script src=".././scripts/aframe-orbit-controls.min.js"></script>
	<script src=".././scripts/faceset.js"></script>
  </head>  
<body>
	<a-scene>
		<a-assets>
			<a-mixin id="mtl0" material="opacity: 0.5; side: double; metalness:0.3; roughness:0.9;"></a-mixin>
			<a-mixin id="mtl1" material="color: #4b97ee;"></a-mixin>
			<a-mixin id="mtl2" material="color: #ee514b"></a-mixin>
			<a-mixin id="mtl3" material="color: #1E9961;"></a-mixin>
			<a-mixin id="mtl4" material="color: #B404AE;"></a-mixin>
			<a-mixin id="mtl5" material="color: #82FA58;"></a-mixin>
			<a-mixin id="mtl6" material="color: #58ACFA;"></a-mixin>
			<a-mixin id="mtl7" material="color: orange;"></a-mixin>
			<a-mixin id="mtl8" material="color: #d8ef09;"></a-mixin>
			<a-mixin id="mtl9" material="color: #6E6E6E;"></a-mixin>
			<a-mixin id="linhas" material="color: black; wireframe: true; wireframe-linewidth:1;"></a-mixin>
			<a-mixin id="mtl0p" material="opacity: 0.2; roughness: 0.9; metalness: 0.3; side: double;"></a-mixin>
			<a-mixin id="texto" text="width: 12; side:double; color: black" rotation="-25 0 0">
			<a-mixin id="reta" geometry="radius:0.04;" mixin="mtl1"></a-mixin>
			<a-mixin id="ponto" geometry="radius:0.1;" mixin="mtl8"></a-mixin>
		</a-assets>

		<a-entity hand-controls controller-cursor raycaster="far: 2"></a-entity>
		<a-entity gearvr-controls></a-entity>
		
		<a-entity scale="0.7 0.7 0.7" position="0 0 1">
			
			<a-entity animation="property: rotation; to: 90 0 0; loop: false; dur: 10000; delay:8500;">
			<a-entity animation="property: position; from: 0 0 0; to: 0 0.01 0; loop: false; dur: 10000; delay:8500;">	
				<a-text position="4.2 0.1 4.4" value="pi'" rotation="-90 0 0" mixin="texto"></a-text>
				<a-text position="4.4 0.1 0.5" value="x" rotation="-90 0 0" mixin="texto"></a-text>
				<a-text position="0 0.1 4.5" value="y" rotation="-90 0 0" mixin="texto"></a-text>

				<a-sphere mixin="ponto" position="2 0 3"></a-sphere>
				<a-text position="2 0.1 3" value="A'" rotation="-90 0 0" mixin="texto"></a-text>
				<a-sphere mixin="ponto" position="1 0 -2"></a-sphere>
				<a-text position="1 0.1 -2" value="B'" rotation="-90 0 0" mixin="texto"></a-text>
				<a-sphere mixin="ponto" position="4 0 -1"></a-sphere>
				<a-text position="4 0.1 -1" value="C'" rotation="-90 0 0" mixin="texto"></a-text>
				<a-sphere mixin="ponto" position="3 0 3.5"></a-sphere>
				<a-text position="3 0.1 3.5" value="D'" rotation="-90 0 0" mixin="texto"></a-text>
				
				<a-entity line="start: 2 0 3; end: 2 0 0; color: #6E6E6E"
				line__6="start: 2 0 3; end: 0 0 3; color: #6E6E6E"
				line__2="start: 1 0 -2; end: 1 0 0; color: #6E6E6E"
				line__7="start: 1 0 -2; end: 0 0 -2; color: #6E6E6E"
				line__3="start: 4 0 -1; end: 4 0 0; color: #6E6E6E"
				line__8="start: 4 0 -1; end: 0 0 -1; color: #6E6E6E"
				line__5="start: 3 0 3.5; end: 3 0 0; color: #6E6E6E"
				line__9="start: 3 0 3.5; end: 0 0 3.5; color: #6E6E6E"
				line__4="start: 0 0 5; end: 0 0 -5; color: green"></a-entity>
			</a-entity>
			</a-entity>

			<a-entity animation="property: rotation; to: 0 -90 0; loop: false; dur: 10000; delay:8500;">
			<a-entity animation="property: position; from: 0 0 0; to: -0.01 0 0; loop: false; dur: 10000; delay:8500;">
				<a-text position="0.1 4.5 5" value="pi'''" rotation="0 90 0" mixin="texto"></a-text>
				<a-text position="0 0.1 4.5" value="y" rotation="-90 0 0" mixin="texto"></a-text>
			
				<a-sphere mixin="ponto" position="0 2 3"></a-sphere>
				<a-text position="0.1 2 3" value="A'''" rotation="0 90 0" mixin="texto"></a-text>
				<a-sphere mixin="ponto" position="0 1.5 -2"></a-sphere>
				<a-text position="0.1 1.5 -2" value="B'''" rotation="0 90 0" mixin="texto"></a-text>
				<a-sphere mixin="ponto" position="0 -2 -1"></a-sphere>
				<a-text position="0.1 -2 -1" value="C'''" rotation="0 90 0" mixin="texto"></a-text>
				<a-sphere mixin="ponto" position="0 -2.5 3.5"></a-sphere>
				<a-text position="0.1 -2.5 3.5" value="D'''" rotation="0 90 0" mixin="texto"></a-text>
				
				<a-entity line="start: 0 2 3; end: 0 0 3; color: #6E6E6E"
				line__1="start: 0 2 3; end: 0 2 0; color: #6E6E6E"
				line__2="start: 0 1.5 -2; end: 0 0 -2; color: #6E6E6E"
				line__6="start: 0 1.5 -2; end: 0 1.5 0; color: #6E6E6E"
				line__3="start: 0 -2 -1; end: 0 0 -1; color: #6E6E6E"
				line__7="start: 0 -2 -1; end: 0 -2 0; color: #6E6E6E"
				line__5="start: 0 -2.5 3.5; end: 0 0 3.5; color: #6E6E6E"
				line__8="start: 0 -2.5 3.5; end: 0 -2.5 0; color: #6E6E6E"
				line__4="start: 0 0 5; end: 0 0 -5; color: green"></a-entity>
			</a-entity>
			</a-entity>
				
			<a-text position="4.2 4.7 0.1" value="pi''" mixin="texto"></a-text>
			<a-text position="0 4.8 0" value="z" mixin="texto"></a-text>
			
			<a-sphere mixin="ponto" position="2 2 3"></a-sphere>
			<a-text position="2 2 3" value="A" mixin="texto"></a-text>
			<a-sphere mixin="ponto" position="2 2 0"></a-sphere>
			<a-text position="2 2 0" value="A''" mixin="texto"></a-text>
			
			<a-sphere mixin="ponto" position="1 1.5 -2"></a-sphere>
			<a-text position="1 1.5 -2" value="B" mixin="texto"></a-text>
			<a-sphere mixin="ponto" position="1 1.5 0"></a-sphere>
			<a-text position="1 1.5 0" value="B''" mixin="texto"></a-text>
			
			<a-sphere mixin="ponto" position="4 -2 -1"></a-sphere>
			<a-text position="4 -2 -1" value="C" mixin="texto"></a-text>
			<a-sphere mixin="ponto" position="4 -2 0"></a-sphere>
			<a-text position="4 -2 0" value="C''" mixin="texto"></a-text>
			
			<a-sphere mixin="ponto" position="3 -2.5 3.5"></a-sphere>
			<a-text position="3 -2.5 3.5" value="D" mixin="texto"></a-text>
			<a-sphere mixin="ponto" position="3 -2.5 0"></a-sphere>
			<a-text position="3 -2.5 0" value="D''" mixin="texto"></a-text>
			
			<a-entity line__2="start: 2 2 0; end: 2 0 0; color: #6E6E6E"
			line__7="start: 2 2 0; end: 0 2 0; color: #6E6E6E"
			line__3="start: 1 1.5 0; end: 1 0 0; color: #6E6E6E"
			line__8="start: 1 1.5 0; end: 0 1.5 0; color: #6E6E6E"
			line__4="start: 4 -2 0; end: 4 0 0; color: #6E6E6E"
			line__9="start: 4 -2 0; end: 0 -2 0; color: #6E6E6E"
			line__6="start: 3 -2.5 0; end: 3 0 0; color: #6E6E6E"
			line__10="start: 3 -2.5 0; end: 0 -2.5 0; color: #6E6E6E"
			line__5="start: -5 0 0; end: 5 0 0; color: red"
			line__1="start: 0 -5 0; end: 0 5 0; color: blue"></a-entity>
			<a-entity id="planoPI2" faceset="vertices: -5 5 0  5 5 0  5 -5 0  -5 -5 0" mixin="mtl0 mtl3"></a-entity>
			<a-entity animation="property: rotation; to: 90 0 0; loop: false; dur: 10000; delay:8500;">
				<a-entity animation="property: position; from: 0 0 0; to: 0 0.01 0; loop: false; dur: 10000; delay:8500;">	
					<a-entity id="planoPI" faceset="vertices: -5 0 5  5 0 5  5 0 -5  -5 0 -5" mixin="mtl0 mtl2"></a-entity>
				</a-entity>
			</a-entity>
			<a-entity animation="property: rotation; to: 0 -90 0; loop: false; dur: 10000; delay:8500;">
				<a-entity animation="property: position; from: 0 0 0; to: -0.01 0 0; loop: false; dur: 10000; delay:8500;">
					<a-entity id="planoPI3" faceset="vertices: 0 -5 5  0 5 5  0 5 -5  0 -5 -5" mixin="mtl0 mtl5"></a-entity>
				</a-entity>
			</a-entity>
		</a-entity>
		
		<a-entity camera="fov:20; near:5;" orbit-controls="target: 0 0 0; maxPolarAngle: 360; initialPosition: 7 12 22"></a-entity>
		<a-sky color="rgba(150,200,255)"></a-sky>

	</a-scene>
</body>
</html>
