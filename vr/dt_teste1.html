<html>
  <head>
	<title>360° Image Browser</title>
	<script src="https://aframe.io/releases/0.8.2/aframe.js"></script>
	<script src="./scripts/aframe-orbit-controls.min.js"></script>
	<script src="./scripts/faceset.js"></script>
</head>  
<body>
	<a-scene shadow="type: pcfsoft">
		<a-assets>
			<a-mixin id="mtl0" material="roughness: 0.1; opacity: 0.6; metalness: 0.55; side: double;"></a-mixin>
			<a-mixin id="mtl0p" material="opacity: 0.1; roughness: 0.1; metalness: 0.35; side: double;"></a-mixin>
			<a-mixin id="mtl1" material="color: orange;"></a-mixin>
			<a-mixin id="mtl2" material="color: #82FA58;"></a-mixin>
			<a-mixin id="mtl3" material="color: #82FA58;"></a-mixin>
			<a-mixin id="mtl4" material="color: yellow;"></a-mixin>
			<a-mixin id="mtl5" material="color: magenta;"></a-mixin>
			<a-mixin id="mtl6" material="color: #9AFE2E;"></a-mixin>
			<a-mixin id="mtl7" material="color: #2E64FE;"></a-mixin>
			<a-mixin id="linhas" material="color: #6E6E6E; metalness:0.4;wireframe: true; linewidth:10;"></a-mixin>
		</a-assets>

		<a-entity hand-controls controller-cursor raycaster="far: 2"></a-entity>
		<a-entity gearvr-controls></a-entity>

		<a-entity id="textos" position="-0.5 -0.5 -0.5">
			<a-text value="Lateral Esquerda" rotation="0 90 0"  position="1.5 2 0.75" color="black" scale="1.2 1.2 1.2"></a-text>
			<a-text value="Frontal" rotation="0 0 0" position="-2 2 2.5" color="black" scale="1.2 1.2 1.2"></a-text>
			<a-text value="Superior" rotation="270 90 0" position="-2 2.5 0" color="black" scale="1.2 1.2 1.2"></a-text>
			<a-text value="Lateral Direita" rotation="0 270 0" position="-2.5 2 -1.25" color="black" scale="1.2 1.2 1.2"></a-text>
			<a-text value="Posterior" rotation="0 180 0" position="-1 2 -1.5" color="black" scale="1.2 1.2 1.2"></a-text>
			<a-text value="Inferior" rotation="90 0 0" position="-2.25 -1.5 2" color="black" scale="1.2 1.2 1.2"></a-text>
		</a-entity>
