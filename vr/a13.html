<html>
  <head>
	<title>360 Image Browser</title>
	<meta charset="ISO-8859-1">
	<script src="https://aframe.io/releases/0.8.2/aframe.min.js"></script>
	<script src=".././scripts/aframe-orbit-controls.min.js"></script>
	<script src=".././scripts/faceset.js"></script>
</head>  
<body>
	<a-scene>
		<a-assets>
			<a-mixin id="mtl0" material="opacity: 0.7; side: double; metalness:0.3; roughness:0.9;"></a-mixin>
			<a-mixin id="mtl1" material="color: #4b97ee;"></a-mixin>
			<a-mixin id="mtl2" material="color: #ee514b"></a-mixin>
			<a-mixin id="mtl3" material="color: #1E9961;"></a-mixin>
			<a-mixin id="mtl4" material="color: #B404AE;"></a-mixin>
			<a-mixin id="mtl5" material="color: #82FA58;"></a-mixin>
			<a-mixin id="mtl6" material="color: #58ACFA;"></a-mixin>
			<a-mixin id="mtl7" material="color: orange;"></a-mixin>
			<a-mixin id="mtl8" material="color: #d8ef09;"></a-mixin>
			<a-mixin id="mtl9" material="color: #6E6E6E;"></a-mixin>
			<a-mixin id="linhas" material="color: black; wireframe: true; wireframe-linewidth:1;"></a-mixin>
			<a-mixin id="mtl0p" material="opacity: 0.2; roughness: 0.9; metalness: 0.3; side: double;"></a-mixin>
			<a-mixin id="texto" text="width: 9; side:double; color: black" rotation="-25 0 0">
			<a-mixin id="ponto" geometry="radius:0.1;" mixin="mtl8"></a-mixin>
		</a-assets>

		<a-entity hand-controls controller-cursor raycaster="far: 2"></a-entity>
		<a-entity gearvr-controls></a-entity>

		<a-entity scale="1 1 1" position="-1 -3 -3.5">
	  		<a-entity>
				<a-text position="1 0.9 0" value="A" mixin="texto"></a-text>
				<a-text position="4 2.4 1" value="B" mixin="texto"></a-text>
				<a-text position="4.7 2.6 4.4" value="C" mixin="texto"></a-text>
				<a-text position="2.4 1.5 6.8" value="D" mixin="texto"></a-text>
				<a-text position="-0.7 0.1 5.8" value="E" mixin="texto"></a-text>
				<a-text position="-1.4 -0.3 2.5" value="F" mixin="texto"></a-text>
				<a-text position="-0.6 4.6 0" value="G" mixin="texto"></a-text>
				<a-text position="2.4 6 1" value="H" mixin="texto"></a-text>
				<a-text position="3.1 6.2 4.4" value="I" mixin="texto"></a-text>
				<a-text position="0.8 5.1 6.8" value="J" mixin="texto"></a-text>
				<a-text position="-2.3 3.7 5.8" value="K" mixin="texto"></a-text>
				<a-text position="-3 3.4 2.5" value="L" mixin="texto"></a-text>
				
				<a-text position="9 0.1 0.5" value="x" rotation="-90 0 0" mixin="texto"></a-text>
				<a-text position="-0.4 0.1 9" value="y" rotation="-90 0 0" mixin="texto"></a-text>
				<a-text position="-0.4 7.5 0" value="z" mixin="texto"></a-text>
				<a-entity line__4="start: 0 0 10; end: 0 0 -2; color: green" 
				line__5="start: -5 0 0; end: 10 0 0; color: red"
				line__1="start: 0 -2 0; end: 0 8 0; color: blue"></a-entity>
				<a-text position="0.1 0.2 0" value="O" mixin="texto"></a-text>
				<a-text position="9 0.1 9.2" value="pi'" rotation="-90 0 0" mixin="texto"></a-text>
				<a-text position="9 7.2 0.1" value="pi''" mixin="texto"></a-text>
				<a-entity id="planoPI" faceset="vertices: -5 0 10  10 0 10  10 0 -2  -5 0 -2" mixin="mtl0p mtl9"></a-entity>
				<a-entity id="planoPI2" faceset="vertices: -5 8 0  10 8 0  10 -2 0  -5 -2 0" mixin="mtl0p mtl9"></a-entity>
				<a-sphere mixin="ponto" position="0 0 0"></a-sphere>
				
				<a-entity faceset="vertices: 1 1 0  4 2.5 1  4.7 2.7 4.4  2.4 1.6 6.8  -0.7 0.2 5.8  -1.4 -0.2 2.5;" 
					mixin="mtl0 mtl8"></a-entity>
				<a-entity faceset="vertices: -0.6 4.3 0  2.4 5.8 1  3.1 6 4.4  0.8 4.9 6.8  -2.3 3.5 5.8  -3 3.1 2.5;" 
					mixin="mtl0 mtl8"></a-entity>
				<a-entity faceset="vertices: 1 1 0  4 2.5 1  -0.6 4.3 0  2.4 5.8 1;" 
					mixin="mtl0 mtl8"></a-entity>
				<a-entity faceset="vertices: 4 2.5 1  4.7 2.7 4.4  2.4 5.8 1  3.1 6 4.4;" 
					mixin="mtl0 mtl8"></a-entity>
				<a-entity faceset="vertices: 4.7 2.7 4.4  2.4 1.6 6.8  3.1 6 4.4  0.8 4.9 6.8;" 
					mixin="mtl0 mtl8"></a-entity>
				<a-entity faceset="vertices: 2.4 1.6 6.8  -0.7 0.2 5.8  0.8 4.9 6.8  -2.3 3.5 5.8;" 
					mixin="mtl0 mtl8"></a-entity>
				<a-entity faceset="vertices: -0.7 0.2 5.8  -1.4 -0.2 2.5  -2.3 3.5 5.8  -3 3.1 2.5;" 
					mixin="mtl0 mtl8"></a-entity>
				<a-entity faceset="vertices: 1 1 0  -1.4 -0.2 2.5  -3 3.1 2.5  -0.6 4.3 0;" 
					mixin="mtl0 mtl8"></a-entity>
				<a-entity line="start: 1 1 0; end: 4 2.5 1; color: #404040" line__2="start: 4 2.5 1; end: 4.7 2.7 4.4; color: #404040"
					line__3="start: 4.7 2.7 4.4; end: 2.4 1.6 6.8; color: #404040" line__4="start: 2.4 1.6 6.8; end: -0.7 0.2 5.8; color: #404040"
					line__5="start: -0.7 0.2 5.8; end: -1.4 -0.2 2.5; color: #404040" line__8="start: -1.4 -0.2 2.5; end: 1 1 0; color: #404040"
					line__6="start: -0.6 4.3 0; end: 2.4 5.8 1; color: #404040" line__7="start: 2.4 5.8 1; end: 3.1 6 4.4; color: #404040;"
					line__9="start: 3.1 6 4.4; end: 0.8 4.9 6.8; color: #404040" line__11="start: 0.8 4.9 6.8; end: -2.3 3.5 5.8; color: #404040"
					line__10="start: -2.3 3.5 5.8; end: -3 3.1 2.5; color: #404040" line__12="start: -3 3.1 2.5; end: -0.6 4.3 0; color: #404040"
					line__13="start: 1 1 0; end: -0.6 4.3 0; color: #404040" line__18="start: 4 2.5 1; end: 2.4 5.8 1; color: #404040;"
					line__14="start: 4.7 2.7 4.4; end: 3.1 6 4.4; color: #404040" line__17="start: 2.4 1.6 6.8; end: 0.8 4.9 6.8; color: #404040"
					line__15="start: -0.7 0.2 5.8; end: -2.3 3.5 5.8; color: #404040" line__16="start: -1.4 -0.2 2.5; end: -3 3.1 2.5; color: #404040">
				</a-entity>

			</a-entity>
		</a-entity>
		
		<a-entity camera="fov:1; near:5;" orbit-controls="target: 0 0 0; maxPolarAngle: 360; initialPosition: 100 250 650"></a-entity>
	  
		<a-light type="ambient" color="#eaeaea" intensity="1"></a-light>
		<a-light type="spot" intensity="1.2" position="0 10 3" angle="180" color="#eaeaea"></a-light>
		<a-sky color="rgba(150,200,255)"></a-sky>

	</a-scene>
</body>
</html>
